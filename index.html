    <script>
        // Références globales
        var code_editor;
        var active_py = "app.py";
        var active_pyxres = "res.pyxres";
        var _capytaleContentChanged = null; // défini par initRPC une fois le socket connecté

        function notifyCapytaleChange() {
            if (_capytaleContentChanged) _capytaleContentChanged();
        }

        function initApp() {
            // --- Tooltips et Popovers ---
            const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
            const tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl))
            const popoverTriggerList = document.querySelectorAll('[data-bs-toggle="popover"]')
            const popoverList = [...popoverTriggerList].map(popoverTriggerEl => new bootstrap.Popover(popoverTriggerEl))

            // --- Éditeur Ace ---
            code_editor = ace.edit("code_editor", {
                theme: "ace/theme/puzzle_code",
                mode: "ace/mode/python",
                minLines: 10,
                fontSize: 14,
                wrap: true,
                useWorker: false,
                readOnly: false,
                autoScrollEditorIntoView: true,
                highlightActiveLine: false,
                highlightSelectedWord: false,
                highlightGutterLine: true,
                showPrintMargin: false,
                displayIndentGuides: true,
                showLineNumbers: true,
                showGutter: true,
                showFoldWidgets: false,
                useSoftTabs: true,
                navigateWithinSoftTabs: false,
                tabSize: 4
            });
            code_editor.container.style.lineHeight = 1.5;
            code_editor.getSession().on('change', function () {
                notifyCapytaleChange();
            });

            // --- Chargement initial depuis le localStorage ---
            const savedData = localStorage.getItem('capytale_pyxel_studio_data');
            if (savedData) {
                const json = JSON.parse(savedData);
                code_editor.getSession().setValue(json[active_py] || json["app.py"] || "", -1);
            }
            document.getElementById('active_py_display').innerText = active_py;

            // --- RPC Capytale ---
            initRPC();

            // --- Rendu initial de l'interface ---
            renderFilesList();
        }
    </script>



    <script>
        // ==================================================================
        // INITIALISATION & RPC (Capytale app-agent / simple-content(json):1)
        // ==================================================================
        async function initRPC() {
            var pyxel_py = "import pyxel\n\n";
            var pyxel_pyxres = "UEsDBBQAAAAAAAAAIQAAAAAAAAAAAAAAAAAPAAAAcHl4ZWxfcmVzb3VyY2UvUEsDBBQAAAAIAAAAIQAkqgK2CAAAAAYAAAAWAAAAcHl4ZWxfcmVzb3VyY2UvdmVyc2lvbjPUs9QzNAMAUEsBAi4DFAAAAAAAAAAhAAAAAAAAAAAAAAAAAA8AAAAAAAAAAAAAAO1BAAAAAHB5eGVsX3Jlc291cmNlL1BLAQIuAxQAAAAIAAAAIQAkqgK2CAAAAAYAAAAWAAAAAAAAAAAAAACkgS0AAABweXhlbF9yZXNvdXJjZS92ZXJzaW9uUEsFBgAAAAACAAIAgQAAAGkAAAAAAA==";
            var defaultData = { "app.py": pyxel_py, "res.pyxres": pyxel_pyxres };

            if (!localStorage.getItem('capytale_pyxel_studio_data')) {
                localStorage.setItem('capytale_pyxel_studio_data', JSON.stringify(defaultData));
            }

            // Ignorer le RPC en mode autonome (pas dans une iframe)
            if (window.parent === window) {
                console.log("Pyxel Studio : mode autonome (aucune iframe Capytale détectée).");
                return;
            }

            try {
                const { getSocket } = await import("https://cdn.jsdelivr.net/npm/@capytale/app-agent/+esm");
                const socket = getSocket();

                // Implémentation du contrat simple-content(json)
                socket.plug('simple-content(json):1', () => ({
                    loadContent(content) {
                        if (!content || Object.keys(content).length === 0) {
                            localStorage.setItem('capytale_pyxel_studio_data', JSON.stringify(defaultData));
                        } else {
                            if (!content["app.py"]) content["app.py"] = pyxel_py;
                            if (!content["res.pyxres"]) content["res.pyxres"] = pyxel_pyxres;
                            localStorage.setItem('capytale_pyxel_studio_data', JSON.stringify(content));
                            code_editor.getSession().setValue(content[active_py] || content["app.py"], -1);
                            document.getElementById('active_pyxres_display').innerText = active_pyxres;
                        }
                        document.getElementById('active_py_display').innerText = active_py;
                        renderFilesList();
                    },
                    getContent() {
                        var json = JSON.parse(localStorage.getItem('capytale_pyxel_studio_data'));
                        json[active_py] = code_editor.getSession().getValue();
                        return json;
                    },
                    contentSaved() {
                        console.log("Pyxel Studio : contenu sauvegardé par Capytale.");
                    }
                }));

                // Accès au côté MetaPlayer pour appeler contentChanged()
                socket.use('simple-content(json)', (sc) => {
                    _capytaleContentChanged = () => sc.i.contentChanged();

                    // Notifier lors de changements localStorage inter-onglets
                    window.addEventListener('storage', function () {
                        sc.i.contentChanged();
                    });
                });

                socket.plugsDone();
                console.log("Pyxel Studio : RPC Capytale initialisé (simple-content(json):1).");
            } catch (e) {
                console.error("Pyxel Studio : échec de l'initialisation du RPC Capytale.", e);
            }
        }
    </script>

    <script>
        function uint8ToBase64(u8) {
            let bin = "";
            for (let i = 0; i < u8.length; i++) {
                bin += String.fromCharCode(u8[i]);
            }
            return btoa(bin);
        }

        async function forceSavePyxelResource() {
            try {
                const resourceIframe = document.querySelector('#pyxel-editor iframe');
                if (!resourceIframe) return;

                // Vérification sécurisée de l'accès cross-origin
                let context;
                try {
                    context = resourceIframe.contentWindow.pyxelContext;
                } catch (e) {
                    // Accès cross-origin bloqué
                    return;
                }

                if (!context || !context.pyodide) {
                    return;
                }

                // --- DÉCLENCHEMENT DE LA SAUVEGARDE (F13) ---
                // F13 force Pyxel à écrire sa RAM dans le VFS.
                // Nos hooks dans l'iframe interceptent l'appel de sauvegarde et le rendent silencieux.
                const doc = resourceIframe.contentWindow.document;
                doc.dispatchEvent(new KeyboardEvent("keydown", { key: "F13", code: "F13", bubbles: true }));
                doc.dispatchEvent(new KeyboardEvent("keyup", { key: "F13", code: "F13", bubbles: true }));

                // --- SYNCHRONISATION SILENCIEUSE DU VFS ---
                // Après F13, on lit le nouvel état depuis le système de fichiers virtuel.
                await new Promise(resolve => setTimeout(resolve, 150)); // Attente pour le flush

                const resData = uint8ToBase64(context.pyodide.FS.readFile(`/pyxel_working_directory/${active_pyxres}`));
                const json = JSON.parse(localStorage.getItem('capytale_pyxel_studio_data') || '{}');
                json[active_pyxres] = resData;
                localStorage.setItem('capytale_pyxel_studio_data', JSON.stringify(json));

                console.log(`Silent auto-save (F13 + VFS) synchronized for ${active_pyxres}.`);
            } catch (e) {
                console.error(`Failed to force save ${active_pyxres}:`, e);
            }
        }

        async function updateActivePythonFileContent() {
            const json = JSON.parse(localStorage.getItem('capytale_pyxel_studio_data'));
            json[active_py] = code_editor.getSession().getValue();
            localStorage.setItem('capytale_pyxel_studio_data', JSON.stringify(json));
        }

        async function run_pyxel() {
            await forceSavePyxelResource().catch(e => console.warn("Background save failed:", e));
            await updateActivePythonFileContent();

            document.getElementById('pyxel-screen').innerHTML = `<iframe src='iframe-screen.html?run=${encodeURIComponent(active_py)}' width='100%' frameborder='0' scrolling='no' style='height:100%'></iframe>`;
        }
        document.getElementById('btn-run-code').addEventListener("click", run_pyxel);
        if (document.getElementById('btn-run-code-center')) {
            document.getElementById('btn-run-code-center').addEventListener("click", run_pyxel);
        }

        function open_resources_tab() {
            const iframeSrc = `iframe-pyxres.html?edit=${encodeURIComponent(active_pyxres)}`;
            const container = document.getElementById('pyxel-editor');
            const iframe = container.querySelector('iframe');
            if (!iframe || iframe.src.indexOf(iframeSrc) === -1) {
                container.innerHTML = `<iframe src='${iframeSrc}' width='100%' frameborder='0' scrolling='no' style='height:100%'></iframe>`;
            }
        }
        document.getElementById('pills-resources_editor-tab').addEventListener("click", open_resources_tab);
        document.getElementById('pills-code_editor-tab').addEventListener("click", () => {
            forceSavePyxelResource().catch(e => console.warn("Background save failed:", e));
        });

        // ====================
        // GESTION DES FICHIERS
        // ====================
        function renderFilesList() {
            const listContainer = document.getElementById('files_list');
            if (!listContainer) return;

            // Supprimer les tooltips existants pour éviter les tooltips fantômes
            const oldTooltips = listContainer.querySelectorAll('[data-bs-toggle="tooltip"]');
            oldTooltips.forEach(el => {
                const tooltip = bootstrap.Tooltip.getInstance(el);
                if (tooltip) tooltip.dispose();
            });

            listContainer.innerHTML = '';
            const json = JSON.parse(localStorage.getItem('capytale_pyxel_studio_data')) || {};

            Object.keys(json).sort().forEach(filename => {
                const li = document.createElement('li');
                li.className = "list-group-item d-flex justify-content-between align-items-center p-1 pe-3";

                let ext = filename.split('.').pop();
                let actionBtn = `<button class="btn btn-light btn-sm" style="width:35px" disabled><i class="fa-solid fa-bars-staggered"></i></button>`;

                if (ext === 'py') {
                    actionBtn = `<button class="btn btn-light btn-sm" onclick="editPythonFile('${filename}')" data-bs-toggle="tooltip" data-bs-title="edit" style="width:35px"><i class="fa-solid fa-code"></i></button>`;
                } else if (ext === 'pyxres') {
                    actionBtn = `<button class="btn btn-light btn-sm" onclick="editPyxresFile('${filename}')" data-bs-toggle="tooltip" data-bs-title="edit" style="width:35px"><i class="fa-solid fa-paintbrush"></i></button>`;
                } else if (ext === 'pyxapp') {
                    actionBtn = `<button class="btn btn-light btn-sm" onclick="playPyxappFile('${filename}')" data-bs-toggle="tooltip" data-bs-title="play" style="width:35px"><i class="fas fa-play"></i></button>`;
                }

                let deleteBtn = '';
                let renameBtn = '';
                if (filename !== 'app.py' && filename !== 'res.pyxres') {
                    renameBtn = `<a tabindex="0" style="cursor:pointer" class="text-primary ms-2" onclick="renameFile('${filename}')" data-bs-toggle="tooltip" data-bs-title="rename"><i class="fa-solid fa-pen" style="font-size:90%"></i></a>`;
                    deleteBtn = `<a tabindex="0" style="cursor:pointer" class="text-danger ms-2" onclick="deleteFile('${filename}')" data-bs-toggle="tooltip" data-bs-title="delete"><i class="fa-solid fa-trash" style="font-size:90%"></i></a>`;
                }

                let downloadBtn = `<a style="cursor:pointer" class="text-dark me-2" onclick="downloadFile('${filename}')" data-bs-toggle="tooltip" data-bs-title="download"><i class="fa-solid fa-circle-down"></i></a>`;

                li.innerHTML = `
                <span class="small">
                    ${actionBtn}
                    <span class="ms-1 ${filename === active_py || filename === active_pyxres ? 'fw-bold text-primary' : ''}">${filename}</span>
                </span>
                <span>${downloadBtn}${renameBtn}${deleteBtn}</span>
            `;
                listContainer.appendChild(li);
            });

            // Réinitialiser les tooltips
            const tooltipTriggerList = document.querySelectorAll('#files_list [data-bs-toggle="tooltip"]');
            [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl));
        }

        async function editPythonFile(filename) {
            if (active_py === filename) {
                bootstrap.Tab.getOrCreateInstance(document.querySelector('#pills-code_editor-tab')).show();
                return;
            }
            await updateActivePythonFileContent();
            active_py = filename;
            const json = JSON.parse(localStorage.getItem('capytale_pyxel_studio_data'));
            code_editor.getSession().setValue(json[filename] || "", -1);
            document.getElementById('active_py_display').innerText = active_py;
            renderFilesList();

            // Basculer vers l'onglet code
            var tab = bootstrap.Tab.getOrCreateInstance(document.querySelector('#pills-code_editor-tab'));
            tab.show();
        }

        async function editPyxresFile(filename) {
            const iframeSrc = `iframe-pyxres.html?edit=${encodeURIComponent(filename)}`;
            const container = document.getElementById('pyxel-editor');
            const iframe = container.querySelector('iframe');

            if (active_pyxres !== filename || !iframe || iframe.src.indexOf(iframeSrc) === -1) {
                await forceSavePyxelResource().catch(e => console.warn("Background save failed:", e));
                active_pyxres = filename;
                document.getElementById('active_pyxres_display').innerText = active_pyxres;
                renderFilesList();

                // Réinjecter l'iframe seulement si nécessaire pour charger un fichier différent
                container.innerHTML = `<iframe src='${iframeSrc}' width='100%' frameborder='0' scrolling='no' style='height:100%'></iframe>`;
            }

            // Basculer vers l'onglet ressources
            var tab = bootstrap.Tab.getOrCreateInstance(document.querySelector('#pills-resources_editor-tab'));
            tab.show();
        }

        async function playPyxappFile(filename) {
            await forceSavePyxelResource();
            await updateActivePythonFileContent();

            document.getElementById('pyxel-screen').innerHTML = `<iframe src='iframe-screen.html?run=${encodeURIComponent(filename)}' width='100%' frameborder='0' scrolling='no' style='height:100%'></iframe>`;
        }

        function addFilePrompt() {
            const filename = prompt("Enter new filename (e.g., script.py or assets.pyxres):");
            if (!filename) return;

            let ext = filename.split('.').pop();
            if (ext !== 'py' && ext !== 'pyxres' && ext !== 'txt') {
                alert("Only .py, .pyxres, or .txt files can be created.");
                return;
            }

            const json = JSON.parse(localStorage.getItem('capytale_pyxel_studio_data'));
            if (json[filename] !== undefined) {
                alert("File already exists.");
                return;
            }

            if (ext === 'py') {
                json[filename] = "# " + filename + "\n";
            } else if (ext === 'txt') {
                json[filename] = "";
            } else if (ext === 'pyxres') {
                // Fichier ressource Pyxel minimal valide en base64
                json[filename] = "UEsDBBQAAAAAAAAAIQAAAAAAAAAAAAAAAAAPAAAAcHl4ZWxfcmVzb3VyY2UvUEsDBBQAAAAIAAAAIQAkqgK2CAAAAAYAAAAWAAAAcHl4ZWxfcmVzb3VyY2UvdmVyc2lvbjPUs9QzNAMAUEsBAi4DFAAAAAAAAAAhAAAAAAAAAAAAAAAAAA8AAAAAAAAAAAAAAO1BAAAAAHB5eGVsX3Jlc291cmNlL1BLAQIuAxQAAAAIAAAAIQAkqgK2CAAAAAYAAAAWAAAAAAAAAAAAAACkgS0AAABweXhlbF9yZXNvdXJjZS92ZXJzaW9uUEsFBgAAAAACAAIAgQAAAGkAAAAAAA==";
            }

            localStorage.setItem('capytale_pyxel_studio_data', JSON.stringify(json));
            renderFilesList();
            notifyCapytaleChange();
        }

        function renameFile(oldFilename) {
            let newFilename = prompt(`Renommer ${oldFilename} en :`, oldFilename);
            if (!newFilename || newFilename === oldFilename) return;

            let ext = newFilename.split('.').pop().toLowerCase();
            let oldExt = oldFilename.split('.').pop().toLowerCase();

            if (!['py', 'txt', 'pyxres', 'pyxapp'].includes(ext)) {
                alert(`Le fichier ${newFilename} n'est pas supporté. Seuls .py, .txt, .pyxres et .pyxapp sont autorisés.`);
                return;
            }

            if (ext !== oldExt) {
                if (!confirm(`Attention, vous changez l'extension de .${oldExt} vers .${ext}. Êtes-vous sûr ?`)) {
                    return;
                }
            }

            const json = JSON.parse(localStorage.getItem('capytale_pyxel_studio_data'));
            if (json[newFilename] !== undefined) {
                alert("Un fichier portant ce nom existe déjà.");
                return;
            }

            // Logique de renommage
            json[newFilename] = json[oldFilename];
            delete json[oldFilename];
            localStorage.setItem('capytale_pyxel_studio_data', JSON.stringify(json));

            // Mettre à jour les fichiers actifs si nécessaire
            if (active_py === oldFilename) {
                active_py = newFilename;
                document.getElementById('active_py_display').innerText = active_py;
            }
            if (active_pyxres === oldFilename) {
                active_pyxres = newFilename;
            }

            renderFilesList();
            notifyCapytaleChange();
        }

        function deleteFile(filename) {
            if (confirm(`Are you sure you want to delete ${filename}?`)) {
                const json = JSON.parse(localStorage.getItem('capytale_pyxel_studio_data'));
                delete json[filename];
                localStorage.setItem('capytale_pyxel_studio_data', JSON.stringify(json));
                if (active_py === filename) active_py = "app.py";
                if (active_pyxres === filename) active_pyxres = "res.pyxres";
                renderFilesList();
                notifyCapytaleChange();
            }
        }

        function downloadFile(filename) {
            const json = JSON.parse(localStorage.getItem('capytale_pyxel_studio_data'));
            let content = json[filename];
            let url;

            let ext = filename.split('.').pop();
            if (ext === 'pyxres' || ext === 'pyxapp') {
                // Convertir le base64 en blob
                const binary = atob(content);
                const array = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) array[i] = binary.charCodeAt(i);
                const blob = new Blob([array], { type: "application/octet-stream" });
                url = URL.createObjectURL(blob);
            } else {
                // Fichier texte
                const blob = new Blob([content], { type: "text/plain" });
                url = URL.createObjectURL(blob);
            }

            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function handleFileUpload(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            const json = JSON.parse(localStorage.getItem('capytale_pyxel_studio_data'));
            let promises = [];

            for (let i = 0; i < files.length; i++) {
                let file = files[i];
                let ext = file.name.split('.').pop().toLowerCase();

                if (!['py', 'txt', 'pyxres', 'pyxapp'].includes(ext)) {
                    alert(`Le fichier ${file.name} n'est pas supporté. Seuls .py, .txt, .pyxres et .pyxapp sont autorisés.`);
                    continue;
                }

                let promise = new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        if (ext === 'pyxres' || ext === 'pyxapp') {
                            // Extraire la partie base64
                            json[file.name] = e.target.result.split(',')[1];
                        } else {
                            // Texte
                            json[file.name] = e.target.result;
                        }
                        resolve();
                    };
                    if (ext === 'pyxres' || ext === 'pyxapp') {
                        reader.readAsDataURL(file);
                    } else {
                        reader.readAsText(file);
                    }
                });
                promises.push(promise);
            }

            Promise.all(promises).then(() => {
                localStorage.setItem('capytale_pyxel_studio_data', JSON.stringify(json));
                renderFilesList();
                notifyCapytaleChange();
                event.target.value = ''; // réinitialiser l'input
            });
        }

        document.addEventListener("DOMContentLoaded", initApp);
    </script>

        Split({
            minSize: 400,
            columnGutters: [{
                track: 1,
                element: document.querySelector('.gutter-col-1'),
            }],
        });
