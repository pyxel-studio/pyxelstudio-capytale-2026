                </div>
                <pre id="console" class="font-monospace" style="font-size:75%;margin:0;padding:10px;color:white;background-color:#1a1a1a;width:100%;height:100%;padding-top:10px;overflow-y:auto;white-space:pre-wrap;word-wrap:break-word;"></pre>

    <script>
	// Redirige la console du navigateur vers un textarea
    let isPaused = false;

    // Pause, play, clear
    document.getElementById('pause').addEventListener('click', () => {isPaused = true;});
    document.getElementById('play').addEventListener('click', () => {isPaused = false;});
    document.getElementById('clear').addEventListener('click', () => {document.getElementById('console').innerHTML = "";});

	(function () {
		var oldLog = console.log;
		var oldError = console.error;

		function writeToConsole(message, color) {
			if (isPaused) return;
			var console_textarea = document.getElementById('console');
			if (!console_textarea) return;
			var text = (typeof message === 'object')
				? (JSON && JSON.stringify ? JSON.stringify(message) : message)
				: message;
			console_textarea.innerHTML += (color ? '<span style="color:' + color + '">' + text + '</span>' : text) + "\n";
			console_textarea.scrollTop = console_textarea.scrollHeight;
		}

		console.log = function (message) {
			// Extraire la version de Pyxel depuis le message de lancement
			if (typeof message === 'string' && message.startsWith("Launch Pyxel")) {
				var match = message.match(/Launch Pyxel (\S+)/);
				if (match) window._pyxelVersion = match[1];
				return; // Ne pas afficher ce message
			}
			if (message !== 'Wake Lock active.' && message !== 'Wake Lock released.'
			&& !(typeof message === 'object' && message !== null && message.command === 'run')
			&& !(typeof message === 'string' && message.startsWith("Attempting to fetch"))
			&& !(typeof message === 'string' && message.startsWith("Attempting to import"))) {
				if (message == 'Loading pyxel') message = 'Chargement de Pyxel ' + (window._pyxelVersion || '') + ' ...';
				if (message == 'Loaded pyxel') message = 'Prêt!';
				writeToConsole(message);
			}
		}

		// Nettoyer un traceback Python pour ne garder que les lignes utiles
		function cleanTraceback(msg) {
			if (typeof msg !== 'string') return msg;
			// Retirer le préfixe "PythonError: " ajouté par Pyodide
			msg = msg.replace(/^PythonError:\s*/g, '');
			if (!msg.includes('Traceback')) return msg;
			var lines = msg.split('\n');
			var cleaned = [];
			var keepNext = false;
			for (var i = 0; i < lines.length; i++) {
				var line = lines[i];
				// Ignorer les lignes d'info Pyodide (module disponible, lien doc...)
				if (line.startsWith('The module ') || line.startsWith('You can install') || line.startsWith('See http')) continue;
				// Garder la ligne d'erreur finale (SyntaxError, TypeError, etc.)
				if (!line.startsWith(' ') && !line.startsWith('Traceback') && line.trim() !== '') {
					cleaned.push(line);
				}
				// Garder les lignes File "xxx.py" (fichiers utilisateur, pas internes)
				else if (line.includes('File "') &&
					!line.includes('_pyodide/') &&
					!line.includes('pyxel/cli.py') &&
					!line.includes('<frozen') &&
					!line.includes('<exec>')) {
					cleaned.push(line);
					keepNext = true;
				}
				// Garder les lignes de contexte après un File utilisateur (code, ^, ~)
				else if (keepNext && line.startsWith('    ')) {
					cleaned.push(line);
				} else {
					keepNext = false;
				}
			}
			if (cleaned.length > 0) {
				cleaned.unshift('\nERREUR');
				return cleaned.join('\n');
			}
			return msg;
		}

		// Anti-doublon : ne pas afficher la même erreur plusieurs fois
		var _shownErrors = [];
		function showError(message) {
			if (typeof message !== 'string') return;
			// Retirer tous les préfixes PythonError (début et intérieurs)
			message = message.replace(/PythonError:\s*/g, '');
			// Si le message contient plusieurs tracebacks concaténés, ne garder que le premier
			var parts = message.split(/(?=Traceback \(most recent call last\))/);
			if (parts.length > 1) message = parts[0] + parts[1];
			var cleaned = cleanTraceback(message);
			// Extraire la ligne XxxError: ... pour la comparaison anti-doublon
			var match = cleaned.match(/(\w+Error:.+)/);
			var key = match ? match[1].trim() : cleaned.trim();
			if (_shownErrors.indexOf(key) !== -1) return;
			_shownErrors.push(key);
			writeToConsole(cleaned, '#ff6b6b');
			hideGameError();
		}

		console.error = function (message) {
			oldError.apply(console, arguments);
			if (typeof message === 'string') showError(message);
		}

		// Observer le DOM pour remplacer l'affichage d'erreur Pyxel
		var errorObserver = new MutationObserver(function() {
			var screen = document.getElementById('pyxel-screen');
			if (!screen) return;
			if (screen.textContent.includes('Traceback') || screen.textContent.includes('SyntaxError') || screen.textContent.includes('NameError') || screen.textContent.includes('TypeError') || screen.textContent.includes('ValueError') || screen.textContent.includes('AttributeError') || screen.textContent.includes('IndentationError') || screen.textContent.includes('ModuleNotFoundError')) {
				errorObserver.disconnect();
				screen.innerHTML = '<div class="font-monospace text-center" style="padding-top:15%;color:#ff6b6b;font-size:1.2em;">Erreur, voir console ci-dessous</div>';
			}
		});
		errorObserver.observe(document.getElementById('pyxel-screen'), { childList: true, subtree: true, characterData: true });

		window._hasError = false;
		function hideGameError() {
			window._hasError = true;
			var container = document.getElementById('pyxel-screen');
			if (container) {
				container.classList.remove('pyxel-ready');
				var splash = document.getElementById('pyxel-splash');
				if (splash) splash.remove();
				container.classList.add('pyxel-error');
				container.innerHTML = '<div class="font-monospace text-center" style="padding-top:15%;color:#ff6b6b;font-size:1.2em;">Erreur, voir console ci-dessous</div>';
			}
		}

		// Capturer les erreurs Python non gérées (Pyodide/Pyxel)
		window.addEventListener('error', function (e) {
			showError(e.message || String(e));
		});
		window.addEventListener('unhandledrejection', function (e) {
			var msg = e.reason?.message || e.reason || '';
			if (typeof msg === 'string' && (msg.includes('Traceback') || msg.includes('Error'))) {
				showError(msg);
			}
		});
	})();
    </script>



    <script>
	function fullscreen(id) {
		var el = document.getElementById(id);
		if (el.requestFullscreen) {
			el.requestFullscreen();
		} else if (el.webkitRequestFullscreen) { /* Safari */
			el.webkitRequestFullscreen();
		} else if (el.msRequestFullscreen) { /* IE11 */
			el.msRequestFullscreen();
		}
	}
	</script>   
	
	<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>	
	<pyxel-run
      root="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/"
	  script="
import js, json, base64, pyxel.cli
pyxel_data = json.loads(js.localStorage.getItem('capytale_pyxel_studio_data'))
for filename, content in pyxel_data.items():
    if filename.endswith('.pyxres') or filename.endswith('.pyxapp'):
        try:
            with open(filename, 'wb') as f:
                f.write(base64.b64decode(content))
        except Exception as e:
            print(f'Error decoding {filename}: {e}')
    else:
        with open(filename, 'w', encoding='utf-8') as f:
            f.write(content)

url_params = js.URLSearchParams.new(js.window.location.search)
run_file = url_params.get('run') or 'app.py'

# Détecter les packages manquants dans le code utilisateur
from pyodide.code import find_imports
import importlib
to_install = []
if not run_file.endswith('.pyxapp'):
    with open(run_file, 'r') as f:
        user_code = f.read()
    for mod in find_imports(user_code):
        try:
            importlib.import_module(mod)
        except ImportError:
            to_install.append(mod)

if to_install:
    # Passer la liste au JavaScript pour chargement async
    from pyodide.ffi import to_js
    js.window._pendingPackages = to_js(to_install)
    js.window._pendingRunFile = run_file
    print('Installation de ' + ', '.join(to_install) + ' ...')
else:
    if run_file.endswith('.pyxapp'):
        pyxel.cli.play_pyxel_app(run_file)
    else:
        pyxel.cli.run_python_script(run_file)
	  "
	></pyxel-run>
    <script>
        // Chargement async des packages manquants puis exécution du code
        var _loadRetries = 0;
        function loadPackagesAndRun() {
            _loadRetries++;
            // Attendre que le script pyxel-run ait défini _pendingPackages (ou pas)
            if (!window._pendingPackages) {
                if (_loadRetries < 300) setTimeout(loadPackagesAndRun, 100); // 30s max
                return;
            }
            // Attendre que Pyodide soit prêt
            var pyodide = window.pyxelContext?.pyodide;
            if (!pyodide || !pyodide.loadPackage) {
                if (_loadRetries < 300) setTimeout(loadPackagesAndRun, 100);
                return;
            }

            var packages = Array.from(window._pendingPackages);
            var runFile = window._pendingRunFile;
            delete window._pendingPackages;
            delete window._pendingRunFile;

            function runUserCode() {
                if (runFile.endsWith('.pyxapp')) {
                    pyodide.runPython("import pyxel.cli; pyxel.cli.play_pyxel_app('" + runFile + "')");
                } else {
                    pyodide.runPython("import pyxel.cli; pyxel.cli.run_python_script('" + runFile + "')");
                }
            }

            // Charger les packages un par un pour identifier ceux qui échouent
            var failed = [];
            var chain = Promise.resolve();
            packages.forEach(function(pkg) {
                chain = chain.then(function() {
                    return pyodide.loadPackage(pkg, {messageCallback: function(msg) {
                        console.log(msg);
                    }}).catch(function() {
                        failed.push(pkg);
                    });
                });
            });
            chain.then(function() {
                if (failed.length > 0) {
                    var plural = failed.length > 1;
                    console.log('Module' + (plural ? 's' : '') + ' ' + failed.join(', ') + ' indisponible' + (plural ? 's' : '') + '. Vous ne pouvez pas utiliser ' + (plural ? 'ces modules.' : 'ce module.'));
                }
                console.log('Prêt!');
                runUserCode();
            });
        }
        loadPackagesAndRun();

        // Masquer le canvas pendant le "Click to start" puis le révéler
        function skipClickToStart() {
            if (window.pyxelContext?.resolveInput) {
                window.pyxelContext.resolveInput();
                setTimeout(function() {
                    window.pyxelContext.resolveInput?.();
                }, 100);
                // Révéler le conteneur après un délai, sauf si une erreur s'est produite
                setTimeout(function() {
                    var container = document.getElementById('pyxel-screen');
                    if (container && !window._hasError) {
                        var splash = document.getElementById('pyxel-splash');
                        if (splash) splash.remove();
                        container.classList.add('pyxel-ready');
                    }
                }, 1000);
            } else {
                setTimeout(skipClickToStart, 10);
            }
        }
        skipClickToStart();
    </script>
